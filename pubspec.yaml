name: project_storm
description: "storm Luxury System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^4.14.0
  firebase_core: ^2.24.2
  path_provider: ^2.1.2
  excel: ^4.0.0
  audioplayers: ^5.2.1
  onesignal_flutter: ^5.1.0
  http: ^1.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/storm_bg.jpg
    - assets/images/storm_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

  assets:
    - assets/images/storm_bg.jpg
    - assets/images/storm_logo.png
    - assets/sounds/working.mp3
    - assets/sounds/done.mp3
    - assets/sounds/waiter.mp3
